<!DOCTYPE html>
<html>
<head>
    <title>View Jobs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="dashboard">
    <h1>Available Jobs</h1>

    <div class="cards">
        {% for job in jobs %}
        <div class="card">
            <h3>{{ job[1] }}</h3>
            <p><strong>Company:</strong> {{ job[2] }}</p>
            <p><strong>Location:</strong> {{ job[3] }}</p>
            <p>{{ job[4] }}</p>
        </div>
        {% endfor %}
    </div>

    <br>
    <a href="/dashboard">Back to Dashboard</a>
</div>
</body>
</html>
