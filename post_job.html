<!DOCTYPE html>
<html>
<head>
    <title>Post Job</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="form-container">
    <h1>Post New Job</h1>

    <form method="POST">

    <input type="text" name="title" placeholder="Job Title" required><br><br>

    <input type="text" name="company" placeholder="Company Name" required><br><br>

    <input type="text" name="location" placeholder="Location" required><br><br>

    <textarea name="description" placeholder="Job Description" rows="5" cols="40"></textarea><br><br>

    <button type="submit">Post Job</button>

</form>

    <br>
    <a href="/dashboard">Back to Dashboard</a>
</div>

</body>
</html>
